name: Tests

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]

jobs:
  config-loading:
    name: config-loading
    runs-on: ubuntu-latest
    permissions:
      checks: write
      pull-requests: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          # pandas==2.2.1 (pinned in requirements.txt) has no prebuilt wheel
          # for cp313 — pip would build it from source, which is slow even
          # on x86_64. 3.12 has wheels for every pin in requirements.txt.
          python-version: '3.12'
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
      - name: Run tests
        run: python -m pytest tests/test_config_loading.py -v --junitxml=test-results.xml
      - name: Publish test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: config-loading tests
          path: test-results.xml
          reporter: java-junit
          fail-on-error: false

