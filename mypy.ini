[mypy]
# Targets what CI actually runs (.github/workflows/tests.yml pins
# python-version: '3.12' for every job -- pandas==2.2.1 has no prebuilt wheel
# for cp313, so CI deliberately avoids 3.13 even though the local .venv here
# runs 3.13.5). Keep this in sync with tests.yml's python-version if that
# ever changes.
python_version = 3.12

# src/ only -- tests/, tests_interface/, and tests_integration/ are
# deliberately out of scope for now (see root CLAUDE.md).
files = src

# There is no src/__init__.py (nor one in any subpackage) -- every
# subcommand that actually runs this code (tasks.py's cmd_run/cmd_interface,
# the pytest suites' own sys.path handling) does so with `cwd=src`, so
# imports throughout src/ are bare top-level names (e.g.
# `from task_managers._task_manager import TaskManager`, not
# `from src.task_managers...`). `mypy_path = src` + `explicit_package_bases`
# tells mypy to resolve modules the same way: rooted at src/ itself, treated
# as implicit namespace packages, not as a `src.` package.
mypy_path = src
explicit_package_bases = True

# Gradual/permissive baseline, not --strict: functions without annotations
# are still allowed (no disallow_untyped_defs), but mypy still type-checks
# annotated code and infers what it can from plain assignments/returns. The
# goal is to catch real bugs (bad argument types, None-handling mistakes,
# etc.) without demanding every function be fully annotated on day one.
warn_return_any = True
warn_unused_ignores = True
warn_redundant_casts = True
warn_unreachable = True
check_untyped_defs = True
no_implicit_optional = True

# twilio ships no inline types (no py.typed marker) and has no published
# types-twilio stub package on PyPI (confirmed via PyPI JSON API) -- ignore
# rather than fight it.
[mypy-twilio.*]
ignore_missing_imports = True

# flask_cors ships no inline types either, but does have a maintained stub
# package (types-Flask-Cors, installed via requirements-dev.txt), so no
# ignore is needed here.
